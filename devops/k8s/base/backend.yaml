---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudsoc-backend
  namespace: cloudsoc
  labels:
    app: cloudsoc-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudsoc-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: cloudsoc-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: backend
          image: dianger16/backend-app
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: cloudsoc-config

          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: cloudsoc-secrets
                  key: SECRET_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cloudsoc-secrets
                  key: DATABASE_URL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cloudsoc-secrets
                  key: OPENAI_API_KEY

          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          livenessProbe:
            httpGet:
              path: /auth/health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /auth/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

      initContainers:
        - name: wait-for-db
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Waiting for PostgreSQL...";
                sleep 2;
              done;
              echo "PostgreSQL is ready."

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: cloudsoc
spec:
  selector:
    app: cloudsoc-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
